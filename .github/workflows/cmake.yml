name: CMake

on:
  push:
    branches:
      - main
  pull_request:

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: Build UF2 artifacts (RP2350)
    runs-on: ubuntu-latest

    env:
      PICO_SDK_PATH: ${{github.workspace}}/pico-sdk

    steps:
    - name: Compiler Cache
      uses: actions/cache@v4
      with:
        path: /home/runner/.ccache
        key: ccache-cmake-${{github.ref}}-${{github.sha}}
        restore-keys: |
          ccache-cmake-${{github.ref}}
          ccache-cmake

    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        path: src

    - name: Checkout Pico SDK
      uses: actions/checkout@v4
      with:
        ref: '2.2.0'
        repository: raspberrypi/pico-sdk
        path: pico-sdk
        submodules: true

    - name: Install Arm GNU Toolchain (arm-none-eabi-gcc)
      uses: carlosperate/arm-none-eabi-gcc-action@v1
      with:
        release: '13.3.Rel1'

    - name: Install CCache
      run: sudo apt update && sudo apt install -y ccache

    # ── Variant 1: full flash nuke ────────────────────────────────────────────
    - name: RP2350 full-nuke - Configure CMake
      run: |
        cmake -E make_directory ${{runner.workspace}}/build-full
        cmake -S ${{github.workspace}}/src -B ${{runner.workspace}}/build-full \
          -DPICO_SDK_PATH=${{github.workspace}}/pico-sdk \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -DPICO_BOARD=pico2

    - name: RP2350 full-nuke - Build
      working-directory: ${{runner.workspace}}/build-full
      run: |
        ccache --zero-stats || true
        cmake --build . --config $BUILD_TYPE -j 2
        ccache --show-stats || true
        cp flash_nuke.uf2 ${{runner.workspace}}/uf2loader-rp2350-full-nuke.uf2

    # ── Variant 2: first 2 MiB nuke ──────────────────────────────────────────
    - name: RP2350 first-2MiB-nuke - Configure CMake
      run: |
        cmake -E make_directory ${{runner.workspace}}/build-2mib
        cmake -S ${{github.workspace}}/src -B ${{runner.workspace}}/build-2mib \
          -DPICO_SDK_PATH=${{github.workspace}}/pico-sdk \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -DPICO_BOARD=pico2 \
          -DNUKE_MAX_BYTES=0x200000

    - name: RP2350 first-2MiB-nuke - Build
      working-directory: ${{runner.workspace}}/build-2mib
      run: |
        ccache --zero-stats || true
        cmake --build . --config $BUILD_TYPE -j 2
        ccache --show-stats || true
        cp flash_nuke.uf2 ${{runner.workspace}}/uf2loader-rp2350-first-2MiB-nuke.uf2

    # ── Upload build artifacts ────────────────────────────────────────────────
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: uf2loader-rp2350-nuke-variants
        path: |
          ${{runner.workspace}}/uf2loader-rp2350-full-nuke.uf2
          ${{runner.workspace}}/uf2loader-rp2350-first-2MiB-nuke.uf2

    # ── Update rolling latest release (main branch only) ─────────────────────
    - name: Update latest release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest Build
        prerelease: true
        make_latest: 'true'
        files: |
          ${{runner.workspace}}/uf2loader-rp2350-full-nuke.uf2
          ${{runner.workspace}}/uf2loader-rp2350-first-2MiB-nuke.uf2
